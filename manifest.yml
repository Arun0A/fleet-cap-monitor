applications:
  - name: fleet-cap-app
    memory: 512M
    instances: 1
    path: gen/srv
    buildpacks:
      - nodejs_buildpack
    env:
      CDS_ENV: cf
    services:
      - fleet-hana
      - fleet-xsuaa
      - fleet-eventmesh

  - name: fleet-workorder-worker
    memory: 128M
    instances: 1
    path: worker/invoice-worker
    buildpacks:
      - nodejs_buildpack
    env:
      CDS_ENV: cf
    services:
      - fleet-hana
      - fleet-xsuaa
      - fleet-eventmesh
