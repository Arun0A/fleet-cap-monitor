<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fleet — IoT Fleet Monitoring | SAP BTP</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "72", "72full", Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #32363a;
      font-size: 14px;
    }

    /* ── Shell Header ─────────────────────────────────────── */
    .shell-header {
      background: #0a6ed1;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      height: 48px;
      gap: 1rem;
    }
    .shell-header .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }
    .shell-header .app-title { font-size: 0.9rem; opacity: .85; }

    /* ── Main layout ──────────────────────────────────────── */
    .page { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    h1.page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 1rem; color: #32363a; }

    /* ── Stat cards ───────────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      background: #fff;
      border-radius: 4px;
      padding: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      border-left: 4px solid #0a6ed1;
    }
    .stat-card .label { font-size: .75rem; color: #6a6d70; text-transform: uppercase; letter-spacing: .4px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #0a6ed1; margin-top: .25rem; }
    .stat-card.green  { border-color: #107e3e; } .stat-card.green .value { color: #107e3e; }
    .stat-card.orange { border-color: #e9730c; } .stat-card.orange .value { color: #e9730c; }
    .stat-card.red    { border-color: #bb0000; } .stat-card.red .value { color: #bb0000; }

    /* ── Panel / Card ─────────────────────────────────────── */
    .panel { background: #fff; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 1.5rem; }
    .panel-header {
      padding: .75rem 1rem;
      border-bottom: 1px solid #e5e5e5;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem;
    }
    .panel-header h2 { font-size: 1rem; font-weight: 600; }
    .panel-body { padding: 1rem; }

    /* ── Toolbar ──────────────────────────────────────────── */
    .toolbar { display: flex; gap: .5rem; flex-wrap: wrap; }

    /* ── Buttons ──────────────────────────────────────────── */
    button {
      padding: .4rem .9rem;
      border-radius: 4px;
      border: 1px solid #0a6ed1;
      cursor: pointer;
      font-size: .85rem;
      transition: background .15s;
    }
    .btn-primary { background: #0a6ed1; color: #fff; }
    .btn-primary:hover { background: #085caf; }
    .btn-secondary { background: #fff; color: #0a6ed1; }
    .btn-secondary:hover { background: #e5f0fb; }
    .btn-success { background: #107e3e; color: #fff; border-color: #107e3e; }
    .btn-success:hover { background: #0b5e2e; }
    .btn-danger  { background: #bb0000; color: #fff; border-color: #bb0000; }
    .btn-danger:hover  { background: #8f0000; }
    .btn-sm { padding: .25rem .6rem; font-size: .78rem; }
    button:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Table ────────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th { background: #f7f7f7; text-align: left; padding: .55rem .75rem; border-bottom: 2px solid #e5e5e5; white-space: nowrap; font-weight: 600; color: #32363a; }
    td { padding: .5rem .75rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:hover td { background: #f2f7fd; }

    /* ── Badges ───────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 10px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-draft     { background: #e5e5e5; color: #6a6d70; }
    .badge-confirmed { background: #d1e8ff; color: #0a6ed1; }
    .badge-delivered { background: #fff3d3; color: #9e6007; }
    .badge-invoiced  { background: #e8f9e8; color: #107e3e; }
    .badge-paid      { background: #107e3e; color: #fff; }
    .badge-cancelled { background: #ffd2d2; color: #bb0000; }
    .badge-pending   { background: #e5e5e5; color: #6a6d70; }
    .badge-shipped   { background: #d1e8ff; color: #0a6ed1; }

    /* ── Form ─────────────────────────────────────────────── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-field { display: flex; flex-direction: column; gap: .3rem; }
    .form-field label { font-size: .8rem; font-weight: 600; color: #6a6d70; }
    .form-field input, .form-field select, .form-field textarea {
      padding: .4rem .6rem;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: .9rem;
      width: 100%;
    }
    .form-field input:focus, .form-field select:focus { outline: 2px solid #0a6ed1; border-color: transparent; }
    .form-actions { margin-top: 1rem; display: flex; gap: .5rem; }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 6px; width: min(600px, 95vw);
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
    }
    .modal-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid #e5e5e5;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 1.05rem; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #6a6d70; padding: 0; }
    .modal-body { padding: 1.25rem; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      padding: .75rem 1.25rem; border-radius: 6px; font-size: .88rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.2); display: none;
      max-width: 360px; animation: slideIn .25s ease;
    }
    #toast.success { background: #107e3e; color: #fff; }
    #toast.error   { background: #bb0000; color: #fff; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Process steps ────────────────────────────────────── */
    .steps { display: flex; align-items: center; gap: 0; flex-wrap: wrap; margin-bottom: 1rem; }
    .step {
      flex: 1; text-align: center; padding: .5rem .25rem; font-size: .75rem;
      background: #f7f7f7; border: 1px solid #e5e5e5; position: relative; font-weight: 600;
    }
    .step.active { background: #0a6ed1; color: #fff; }
    .step + .step::before {
      content: ''; position: absolute; left: -1px; top: 50%; transform: translateY(-50%);
      border: 8px solid transparent; border-left-color: #e5e5e5;
    }
    .step.active + .step::before { border-left-color: #0a6ed1; }

    /* ── Empty state ──────────────────────────────────────── */
    .empty { text-align: center; padding: 2.5rem 1rem; color: #6a6d70; font-size: .9rem; }

    /* ── Tab nav ──────────────────────────────────────────── */
    .tabs { display: flex; border-bottom: 2px solid #e5e5e5; margin-bottom: 1rem; }
    .tab-btn {
      padding: .6rem 1.2rem; border: none; background: none; cursor: pointer;
      font-size: .9rem; color: #6a6d70; border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .tab-btn.active { color: #0a6ed1; border-bottom-color: #0a6ed1; font-weight: 600; }
  </style>
</head>
<body>

<!-- Shell Header -->
<header class="shell-header">
  <span class="logo">SAP BTP</span>
  <span style="opacity:.4">|</span>
  <span class="app-title">Fleet Monitoring</span>
</header>

<div class="page">
  <h1 class="page-title">IoT Fleet Dashboard</h1>

  <div class="stat-grid" id="kpiCards">
    <div class="stat-card"><div class="label">Devices</div><div class="value" id="kpi-devices">—</div></div>
    <div class="stat-card orange"><div class="label">Active Alerts</div><div class="value" id="kpi-alerts">—</div></div>
    <div class="stat-card green"><div class="label">Open WorkOrders</div><div class="value" id="kpi-work-open">—</div></div>
    <div class="stat-card"><div class="label">Completed WorkOrders</div><div class="value" id="kpi-work-done">—</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('devices')">Devices</button>
    <button class="tab-btn" onclick="showTab('alerts')">Alerts</button>
    <button class="tab-btn" onclick="showTab('work')">Work Orders</button>
  </div>

  <div id="tab-devices">
    <div class="panel">
      <div class="panel-header">
        <h2>Devices</h2>
        <div class="toolbar">
          <button class="btn-primary btn-sm" onclick="openRegisterDevice()">+ Register Device</button>
          <button class="btn-secondary btn-sm" onclick="loadDevices()">↻ Refresh</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>Model</th><th>Last Seen</th></tr></thead>
            <tbody id="devicesBody"><tr><td colspan="4" class="empty">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>Ingest Telemetry</h2></div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="form-field"><label>Device</label><select id="t-device"></select></div>
          <div class="form-field"><label>Metric</label><input id="t-metric" value="temperature"/></div>
          <div class="form-field"><label>Value</label><input id="t-value" type="number"/></div>
          <div class="form-field"><label>Threshold (optional)</label><input id="t-threshold" type="number" placeholder="100"/></div>
        </div>
        <div class="form-actions"><button class="btn-success" onclick="submitTelemetry()">Ingest</button></div>
      </div>
    </div>
  </div>

  <div id="tab-alerts" style="display:none">
    <div class="panel">
      <div class="panel-header">
        <h2>Alerts</h2>
        <div class="toolbar"><button class="btn-secondary btn-sm" onclick="loadAlerts()">↻ Refresh</button></div>
      </div>
      <div class="panel-body">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>ID</th><th>Device</th><th>Description</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="alertsBody"><tr><td colspan="5" class="empty">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-work" style="display:none">
    <div class="panel">
      <div class="panel-header">
        <h2>Work Orders</h2>
        <div class="toolbar"><button class="btn-secondary btn-sm" onclick="loadWorkOrders()">↻ Refresh</button></div>
      </div>
      <div class="panel-body">
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>Work #</th><th>Device</th><th>Alert</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="workBody"><tr><td colspan="5" class="empty">No work orders</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = '/api/fleet';

// ── Utilities ─────────────────────────────────────────────────────────────

const fmt  = n => n != null ? Number(n).toLocaleString('en-IN', {maximumFractionDigits:2}) : '—';
const date = s => s ? new Date(s).toLocaleDateString('en-IN') : '—';

function badge(status) {
  const cls = status ? status.toLowerCase().replace(/\s+/g,'-') : 'pending';
  return `<span class="badge badge-${cls}">${status || '—'}</span>`;
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
  return data.value ?? data;
}

// ── Tabs ──────────────────────────────────────────────────────────────────

const TABS = ['devices','alerts','work'];
function showTab(name) {
  TABS.forEach(t => {
    const el = document.getElementById(`tab-${t}`);
    if (el) el.style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', TABS[i] === name);
  });
  if (name === 'devices') loadDevices();
  if (name === 'alerts')  loadAlerts();
  if (name === 'work')    loadWorkOrders();
}

// ── KPI ───────────────────────────────────────────────────────────────────

async function loadKPIs() {
  try {
    const rows = await api('/getFleetSummary()');
    // rows: [{status, count}] - map into our KPI buckets
    const devices = await api('/Devices');
    const alerts = await api('/Alerts?$filter=isAlert eq true');
    const work = await api('/WorkOrders');
    document.getElementById('kpi-devices').textContent = devices.length || 0;
    document.getElementById('kpi-alerts').textContent = alerts.length || 0;
    document.getElementById('kpi-work-open').textContent = (work.filter(w=>w.status==='Open').length) || 0;
    document.getElementById('kpi-work-done').textContent = (work.filter(w=>w.status==='Completed').length) || 0;
  } catch(e) { console.warn('KPI load failed', e); }
}

async function loadDevices() {
  try {
    const data = await api('/Devices');
    const tbody = document.getElementById('devicesBody');
    const selector = document.getElementById('t-device');
    if (!data.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty">No devices registered</td></tr>`;
      selector.innerHTML = '<option value="">Register a device first</option>';
      return;
    }
    tbody.innerHTML = data.map(d => `
      <tr>
        <td><code style="font-size:.75rem">${d.ID.slice(0,8)}…</code></td>
        <td>${d.name || d.deviceId || '—'}</td>
        <td>${d.model || '—'}</td>
        <td>${d.lastSeen ? new Date(d.lastSeen).toLocaleString() : '—'}</td>
      </tr>
    `).join('');
    selector.innerHTML = data.map(d => `<option value="${d.ID}">${d.name || d.deviceId} (${d.deviceId})</option>`).join('');
    loadKPIs();
  } catch(e) { toast('Failed to load devices: ' + e.message, 'error'); }
}

async function loadAlerts() {
  try {
    const data = await api('/Alerts?$orderby=createdAt desc');
    const tbody = document.getElementById('alertsBody');
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty">No alerts</td></tr>`; return; }
    tbody.innerHTML = data.map(a => `
      <tr>
        <td><code>${a.ID.slice(0,8)}…</code></td>
        <td>${a.device_ID || '—'}</td>
        <td>${a.description || '—'}</td>
        <td>${a.createdAt ? new Date(a.createdAt).toLocaleString() : '—'}</td>
        <td><button class="btn-sm btn-primary" onclick="createWorkFromAlert('${a.ID}')">Create Work</button></td>
      </tr>
    `).join('');
  } catch(e) { toast('Failed to load alerts: ' + e.message, 'error'); }
}

async function loadWorkOrders() {
  try {
    const data = await api('/WorkOrders?$orderby=createdAt desc');
    const tbody = document.getElementById('workBody');
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty">No work orders</td></tr>`; return; }
    tbody.innerHTML = data.map(w => `
      <tr>
        <td>${w.workNo || w.ID.slice(0,8)}</td>
        <td>${w.device_ID || '—'}</td>
        <td>${w.alert_ID ? w.alert_ID.slice(0,8)+'…' : '—'}</td>
        <td>${w.status || '—'}</td>
        <td>${w.status !== 'Completed' ? `<button class="btn-success btn-sm" onclick="completeWork('${w.ID}')">Complete</button>` : '—'}</td>
      </tr>
    `).join('');
  } catch(e) { toast('Failed to load work orders: ' + e.message, 'error'); }
}

// ── Master Data ───────────────────────────────────────────────────────────

async function openRegisterDevice() {
  const id = prompt('Device ID (unique):', 'dev-' + Date.now());
  if (!id) return;
  const name = prompt('Device name:', id) || id;
  const model = prompt('Device model:', 'Generic Sensor') || 'Generic Sensor';
  try {
    await api('/registerDevice', { method: 'POST', body: { deviceId: id, name, model } });
    toast('Device registered'); loadDevices();
  } catch(e) { toast(e.message, 'error'); }
}

async function submitTelemetry() {
  const device = document.getElementById('t-device').value;
  const metric = document.getElementById('t-metric').value;
  const value  = Number(document.getElementById('t-value').value);
  const threshold = document.getElementById('t-threshold').value;
  if (!device || isNaN(value)) { toast('Provide device and numeric value', 'error'); return; }
  try {
    await api('/ingestTelemetry', { method: 'POST', body: { deviceID: device, metric, value, threshold: threshold ? Number(threshold) : undefined } });
    toast('Telemetry ingested');
    loadDevices();
    loadAlerts();
    loadWorkOrders();
    loadKPIs();
  } catch(e) { toast(e.message, 'error'); }
}

async function createWorkFromAlert(alertID) {
  try {
    await api('/createWorkOrder', { method: 'POST', body: { alertID, description: 'Auto-created from UI' } });
    toast('Work order created'); loadWorkOrders(); showTab('work');
  } catch(e) { toast(e.message, 'error'); }
}

async function completeWork(id) {
  try {
    await api(`/WorkOrders(${id})/FleetService.completeWorkOrder`, { method: 'POST', body: {} });
    toast('Marked completed');
    loadWorkOrders();
    loadKPIs();
  } catch(e) { toast(e.message, 'error'); }
}

// ── Init ──────────────────────────────────────────────────────────────────

// Init default view
showTab('devices');
loadKPIs();
</script>
</body>
</html>
